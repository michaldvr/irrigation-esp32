esphome:
  name: "irrigation-system"
  friendly_name: Irrigation System

esp32:
  board: esp32dev
  framework:
    type: esp-idf

# Enable logging
logger:
  level: DEBUG

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Irrigation Fallback Hotspot"
    password: !secret fallback_ap_password

captive_portal:
web_server:
  port: 80
  version: 2

# Soil Moisture Sensors
sensor:
  - platform: adc
    pin: 35
    name: "Soil Hibiscus"
    id: soil_hibiscus
    attenuation: 12db
    device_class: ""
    unit_of_measurement: "%"
    icon: "mdi:water-percent"
    update_interval: 1s
    filters:
      - median:
          window_size: 300
          send_every: 10
      - calibrate_linear:
          - 2.85 -> 0.0
          - 1.05 -> 100.0
      - lambda: "return (x < 0) ? 0 : (x > 100) ? 100 : x;"
      - throttle: 10s

  - platform: adc
    pin: 34
    name: "Soil Ficus"
    id: soil_ficus
    attenuation: 12db
    device_class: ""
    unit_of_measurement: "%"
    icon: "mdi:water-percent"
    update_interval: 1s
    filters:
      - median:
          window_size: 300
          send_every: 10
      - calibrate_linear:
          - 2.85 -> 0.0
          - 1.05 -> 100.0
      - lambda: "return (x < 0) ? 0 : (x > 100) ? 100 : x;"
      - throttle: 10s

  - platform: adc
    pin: 32
    name: "Soil Onion"
    id: soil_onion
    attenuation: 12db
    device_class: ""
    unit_of_measurement: "%"
    icon: "mdi:water-percent"
    update_interval: 1s
    filters:
      - median:
          window_size: 300
          send_every: 10
      - calibrate_linear:
          - 2.85 -> 0.0
          - 1.05 -> 100.0
      - lambda: "return (x < 0) ? 0 : (x > 100) ? 100 : x;"
      - throttle: 10s

script:
  - id: safety_timer
    mode: restart # Every time a valve is turned on, the 5s starts over
    then:
      - delay: 5s
      - logger.log: "Safety Timer reached - Shutting down all outputs"
      - switch.turn_off: pump_main
      - switch.turn_off: valve_hibiscus
      - switch.turn_off: valve_onion
      - switch.turn_off: valve_ficus

switch:
  - platform: gpio
    pin: 26
    name: "Pump"
    id: pump_main
    restore_mode: ALWAYS_OFF
    internal: false # Keep visible in UI
    icon: "mdi:water-pump"

  - platform: gpio
    pin: 27
    name: "Valve Hibiscus"
    id: valve_hibiscus
    restore_mode: ALWAYS_OFF
    icon: "mdi:valve"
    on_turn_on:
      - switch.turn_off: valve_onion
      - switch.turn_off: valve_ficus
      - delay: 500ms
      - switch.turn_on: pump_main
      - script.execute: safety_timer
    on_turn_off:
      - switch.turn_off: pump_main

  - platform: gpio
    pin: 14
    name: "Valve Onion"
    id: valve_onion
    restore_mode: ALWAYS_OFF
    icon: "mdi:valve"
    on_turn_on:
      - switch.turn_off: valve_hibiscus
      - switch.turn_off: valve_ficus
      - delay: 500ms
      - switch.turn_on: pump_main
      - script.execute: safety_timer
    on_turn_off:
      - switch.turn_off: pump_main

  - platform: gpio
    pin: 12
    name: "Valve Ficus"
    id: valve_ficus
    restore_mode: ALWAYS_OFF
    icon: "mdi:valve"
    on_turn_on:
      - switch.turn_off: valve_hibiscus
      - switch.turn_off: valve_onion
      - delay: 500ms
      - switch.turn_on: pump_main
      - script.execute: safety_timer
    on_turn_off:
      - switch.turn_off: pump_main